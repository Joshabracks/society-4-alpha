# Copied into workspace repos as `.github/workflows/society4-cold-backup.yml`.
# Opaque merge: manifest DAG + content hashes only — no WMSK or plaintext.

name: Society 4 cold backup merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

env:
  S4_BACKUP_TTL_DAYS: ${{ vars.S4_BACKUP_TTL_DAYS || '14' }}

jobs:
  merge-prune:
    runs-on: ubuntu-latest
    steps:
      - name: Merge signal branches and prune TTL
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch =
              context.payload?.repository?.default_branch || "main";
            const ttlDays = parseInt(process.env.S4_BACKUP_TTL_DAYS || "14", 10);
            const nowSec = Math.floor(Date.now() / 1000);
            const ttlCutoff = nowSec - ttlDays * 86400;
            const ephemeralRe = /^[A-Za-z0-9](?:[A-Za-z0-9-]*[A-Za-z0-9])?-\d+$/;

            async function getFile(path, ref) {
              try {
                const res = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref,
                });
                if (Array.isArray(res.data) || !res.data.content) return null;
                const bytes = Buffer.from(res.data.content, "base64");
                return { bytes, sha: res.data.sha, encoding: res.data.encoding };
              } catch (e) {
                if (e.status === 404) return null;
                throw e;
              }
            }

            async function putFile(path, bytes, message, branch, existingSha) {
              const body = {
                owner,
                repo,
                path,
                message,
                content: bytes.toString("base64"),
                branch,
              };
              if (existingSha) body.sha = existingSha;
              await github.rest.repos.createOrUpdateFileContents(body);
            }

            let mainIndexFile = await getFile("society4/packs/index.json", defaultBranch);
            let index = mainIndexFile
              ? JSON.parse(mainIndexFile.bytes.toString("utf8"))
              : { schema: 1, packs: [] };
            if (!Array.isArray(index.packs)) index.packs = [];

            const packMap = new Map();
            for (const p of index.packs) packMap.set(p.pack_id, p);

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );
            const ephemeral = branches
              .map((b) => b.name)
              .filter((n) => n !== defaultBranch && ephemeralRe.test(n));

            for (const branch of ephemeral) {
              const branchIndexFile = await getFile(
                "society4/packs/index.json",
                branch
              );
              if (!branchIndexFile) continue;
              const branchIndex = JSON.parse(branchIndexFile.bytes.toString("utf8"));
              for (const entry of branchIndex.packs || []) {
                const existing = packMap.get(entry.pack_id);
                if (
                  existing &&
                  entry.created_at_unix <= existing.created_at_unix
                ) {
                  continue;
                }
                for (const suffix of ["manifest.json", "payload.bin.enc"]) {
                  const path = `society4/packs/${entry.pack_id}/${suffix}`;
                  const src = await getFile(path, branch);
                  if (!src) continue;
                  const dst = await getFile(path, defaultBranch);
                  await putFile(
                    path,
                    src.bytes,
                    `chore(society4): merge pack ${entry.pack_id} from ${branch}`,
                    defaultBranch,
                    dst?.sha
                  );
                }
                packMap.set(entry.pack_id, entry);
              }
            }

            const merged = [...packMap.values()].sort(
              (a, b) => b.created_at_unix - a.created_at_unix
            );

            // Checkpoint saturation: drop packs older than the newest saturated pack.
            let satCutoff = 0;
            const acksFile = await getFile("society4/packs/acks.json", defaultBranch);
            if (acksFile) {
              try {
                const acks = JSON.parse(acksFile.bytes.toString("utf8"));
                for (const entry of acks.packs || []) {
                  if (entry.saturated_at_unix && entry.created_at_unix > satCutoff) {
                    satCutoff = entry.created_at_unix;
                  }
                }
              } catch (e) {
                core.warning(`acks parse: ${e.message}`);
              }
            }

            const kept = [];
            const pruned = [];
            for (const entry of merged) {
              const ttlOut = entry.created_at_unix < ttlCutoff;
              const satOut = satCutoff > 0 && entry.created_at_unix < satCutoff;
              if (ttlOut || satOut) {
                pruned.push(entry.pack_id);
              } else {
                kept.push(entry);
              }
            }

            for (const packId of pruned) {
              for (const suffix of ["manifest.json", "payload.bin.enc"]) {
                const path = `society4/packs/${packId}/${suffix}`;
                const file = await getFile(path, defaultBranch);
                if (!file) continue;
                await github.rest.repos.deleteFile({
                  owner,
                  repo,
                  path,
                  message: `chore(society4): prune pack ${packId}`,
                  sha: file.sha,
                  branch: defaultBranch,
                });
              }
            }

            index.packs = kept;
            const indexJson = JSON.stringify(index, null, 2) + "\n";
            await putFile(
              "society4/packs/index.json",
              Buffer.from(indexJson, "utf8"),
              "chore(society4): merge cold pack index",
              defaultBranch,
              mainIndexFile?.sha
            );

            for (const branch of ephemeral) {
              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
              } catch (e) {
                core.warning(`could not delete branch ${branch}: ${e.message}`);
              }
            }

            core.info(
              `merged ${ephemeral.length} signal branch(es); kept ${kept.length} pack(s); pruned ${pruned.length}; satCutoff=${satCutoff}`
            );
